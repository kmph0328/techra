# 自律成長パイプライン: 日次でニュースを収集し、コンテンツ差分を配信する
#
# - ANTHROPIC_API_KEY シークレット未設定でも動く(収集のみ → content/inbox.json)
# - シークレットを設定すると、Claudeが TECHRA形式のニュース解説を起草し
#   content/update.json / manifest.json を更新 → Pagesへ自動デプロイ → 全訪問者に反映
name: Update content (autonomous growth)

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Anthropic SDK
        run: npm install --no-save --no-package-lock @anthropic-ai/sdk

      - name: Collect news and draft content
        run: node tools/update-news.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name "techra-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: 自動コンテンツ更新 $(date -u +%F)"
            git push
          fi
